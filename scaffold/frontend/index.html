<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>맵시TI</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="app-header app-header--simple">
        <div>
          <p class="brand-kicker">맵시TI ✨</p>
          <h1 class="brand-title">나만의 패션 페르소나를 찾아봐!</h1>
          <p class="brand-subtitle">성별, 퍼스널컬러, 스타일, 핏 분석으로 나에게 꼭 맞는 무드를 찾아봐.</p>
        </div>
      </header>

      <main id="screenHost"></main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="modalRoot" class="modal-root hidden" aria-hidden="true">
      <div class="modal-card">
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-actions">
          <button id="modalConfirmBtn" class="btn btn-dark" type="button">확인</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
