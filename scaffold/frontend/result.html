<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맵시TI - 결과</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="result">
  <div class="bg-pattern"></div>
  <div class="app">

    <div class="screen active" id="s-result">
      <div style="text-align:center;margin-bottom:8px;">
        <span id="result-badge" style="display:inline-block;background:#FF7BAC;color:#fff;border:2.5px solid #1E1B3A;border-radius:99px;padding:5px 18px;font-size:15px;box-shadow:3px 3px 0 #1E1B3A;">나의 맵시TI</span>
      </div>
      <div id="result-char" style="border:3px solid #1E1B3A;border-radius:22px;box-shadow:6px 6px 0 #1E1B3A;padding:26px 18px;text-align:center;margin-bottom:16px;">
        <div id="char-img" style="width:130px;height:130px;margin:0 auto 14px;background:#fff;border:3px solid #1E1B3A;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:64px;">🎭</div>
        <div id="result-title" style="font-size:28px;color:#1E1B3A;margin-bottom:4px;"></div>
        <div id="result-sub" style="font-size:17px;color:#7C6F9A;margin-bottom:14px;"></div>
      </div>
      <div id="result-desc-card" class="pcard">
        <div id="result-desc"></div>
        <div id="result-items"></div>
      </div>
      <div id="analysis-summary-card" class="analysis-summary-card" style="display:none;">
        <div id="analysis-summary-title" class="analysis-summary-title">분석 요약</div>
        <div id="analysis-summary-text" class="analysis-summary-text"></div>
        <div id="analysis-summary-tags" class="analysis-summary-tags"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div id="style-tip-card" class="pcard" style="margin-bottom:0;">
          <div style="font-size:15px;font-weight:700;color:#1E1B3A;margin-bottom:8px;">💡 스타일 팁</div>
          <div id="style-tip-text" style="font-size:14px;color:#1E1B3A;line-height:1.6;font-family:'Noto Sans KR',sans-serif;"></div>
        </div>
        <div id="point-color-card" class="pcard" style="margin-bottom:0;">
          <div style="font-size:15px;font-weight:700;color:#1E1B3A;margin-bottom:8px;">🎨 포인트 컬러</div>
          <div id="point-color-tags"></div>
        </div>
      </div>
      <div class="pcard">
        <div style="font-size:20px;color:#1E1B3A;margin-bottom:14px;font-weight:700;">🛒 쇼핑 큐레이션</div>
        <div id="cat-tabs" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
          <div>
            <div style="font-size:13px;color:#7C6F9A;margin-bottom:4px;">핏 선택</div>
            <select id="fit-select"></select>
          </div>
          <div>
            <div style="font-size:13px;color:#7C6F9A;margin-bottom:4px;">컬러 선택</div>
            <select id="color-select"></select>
          </div>
        </div>
        <button id="preview-btn" style="display:block;width:100%;padding:14px;font-family:'Jua',sans-serif;font-size:17px;background:#5ECFA8;color:#fff;border:3px solid #1E1B3A;border-radius:14px;box-shadow:5px 5px 0 #1E1B3A;cursor:pointer;margin-bottom:16px;">⚡ 맞춤 상품 보기</button>
        <div id="product-results"></div>
        <div id="shop-links" style="display:flex;gap:10px;margin-top:12px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;">
        <button id="share-result-btn" style="padding:15px;font-family:'Jua',sans-serif;font-size:17px;background:#FF7BAC;color:#fff;border:3px solid #1E1B3A;border-radius:14px;box-shadow:5px 5px 0 #1E1B3A;cursor:pointer;">📸 결과 공유</button>
        <button id="reset-btn" style="padding:15px;font-family:'Jua',sans-serif;font-size:17px;background:#1E1B3A;color:#fff;border:3px solid #1E1B3A;border-radius:14px;box-shadow:5px 5px 0 #A78BFA;cursor:pointer;">🔄 다시하기</button>
      </div>
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
